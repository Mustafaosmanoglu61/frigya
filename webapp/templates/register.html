<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kayıt Ol — Frigya</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-primary-custom text-white">
            <strong>Frigya</strong> — Kayıt
          </div>
          <div class="card-body">
            {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}

            <form method="post" action="/auth/register">
              <input type="hidden" name="next_url" value="{{ next_url }}">
              <div class="mb-3">
                <label class="form-label">E-posta</label>
                <input type="email" name="email" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Şifre</label>
                <input type="password" name="password" class="form-control" minlength="8" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Şifre (Tekrar)</label>
                <input type="password" name="password_confirm" class="form-control" minlength="8" required>
              </div>
              <button type="submit" class="btn btn-success w-100">Kayıt Ol</button>
            </form>

            {% if google_enabled %}
            <div class="text-center text-muted my-3">veya</div>
            <a class="btn btn-outline-dark w-100" href="/auth/google/start?next={{ next_url }}">
              Google ile devam et
            </a>
            {% endif %}

            <div class="mt-3 text-center">
              <a href="/auth/login?next={{ next_url }}">Zaten hesabın var mı? Giriş yap</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
